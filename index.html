<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>바나나 톡톡 (Banana Tok Tok)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@400;700&family=Jua&display=swap" rel="stylesheet">

    <style>
        html, body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-overflow-scrolling: touch;
        }

        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Jua', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 9:16 모바일 세로형 화면 최적화 & 예쁜 2D 캐주얼 해변 배경 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 850px;
            background: linear-gradient(to bottom, 
                #7dd3fc 0%, #7dd3fc 45%,   /* 화창한 하늘 */
                #22d3ee 45%, #0891b2 65%,  /* 에메랄드 빛 맑은 바다 */
                #fef08a 65%, #facc15 100%  /* 따뜻한 노란 모래사장 */
            );
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px 30px 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        @media (min-width: 450px) {
            #game-container {
                height: 177.78vw;
                border: 8px solid #fff;
                border-radius: 24px;
            }
        }

        /* ☁️ 배경 데코레이션 1: 흘러가는 귀여운 2D 구름 효과 */
        .bg-cloud {
            position: absolute;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.8);
            top: 15%;
            animation: floatCloud 15s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        .cloud-2 { top: 28%; animation-duration: 22s; animation-delay: -5s; font-size: 2.2rem; opacity: 0.6; }

        /* 🌊 배경 데코레이션 2: 백사장 거품 파도 */
        #game-container::before {
            content: '';
            position: absolute;
            top: 64.5%; left: 0; width: 200%; height: 15px;
            background: radial-gradient(circle at 50% 100%, transparent 10px, #fff 11px);
            background-size: 40px 20px;
            opacity: 0.5;
            animation: waveMotion 4s linear infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        /* 🌴 배경 데코레이션 3: 야자수 */
        .bg-palm {
            position: absolute;
            font-size: 5.5rem;
            bottom: 25%;
            left: -15px;
            opacity: 0.8;
            filter: drop-shadow(0 4px 0px rgba(0,0,0,0.1));
            pointer-events: none;
            z-index: 1;
        }
        .palm-right { left: auto; right: -25px; font-size: 6.5rem; bottom: 22%; transform: scaleX(-1); }

        /* 상단 타이틀 & 스코어 UI */
        #header { text-align: center; z-index: 2; pointer-events: auto; }
        h1 {
            font-family: 'Jua', sans-serif;
            color: #ffeb3b;
            font-size: 3.4rem;
            margin: 0 0 5px 0;
            font-weight: normal;
            letter-spacing: 0px;
            text-shadow: 2px 3px 0px #e65100, 4px 6px 10px rgba(0,0,0,0.15);
        }
        #info-panel {
            background: #ffffff;
            border: 4px solid #ff9800;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            color: #5d4037;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 10px;
        }
        #touch-left { color: #e91e63; font-size: 1.4rem; }

        /* 도감 열기 버튼 */
        #book-open-btn {
            font-family: 'Jua', sans-serif;
            background: #ff5722;
            color: white;
            border: 2px solid #fff;
            border-radius: 20px;
            padding: 8px 22px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 0px #d84315;
            display: inline-block;
        }

        /* 메인 캐릭터(바나나) 스테이지 */
        #banana-stage {
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            filter: drop-shadow(0px 10px 0px rgba(0,0,0,0.12));
            pointer-events: none;
            transition: transform 0.05s ease-out;
        }

        #banana-view {
            width: 250px;
            height: 250px;
            background-size: 1000px 1000px;
            background-repeat: no-repeat;
            background-position: 0px 0px;
        }

        #footer-text { font-family: 'Jua', sans-serif; font-size: 1.3rem; height: 20px; z-index: 2; color: #795548; pointer-events: none; }

        /* 콤보 카운트 표시 UI */
        #combo-panel {
            position: absolute;
            top: 48%;
            font-size: 2rem;
            color: #ffeb3b;
            text-shadow: 2px 2px 0px #e65100;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.1s, transform 0.1s;
        }
        #combo-panel.active {
            opacity: 1;
            transform: scale(1) rotate(-5deg);
        }

        /* ✨ 파티클(별 모양) 스타일 */
        .particle {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 99;
            animation: explode 0.6s ease-out forwards;
        }

        /* 통통한 캐주얼 버튼 스타일 */
        .casual-btn {
            font-family: 'Jua', sans-serif;
            padding: 14px 45px;
            font-size: 1.6rem;
            color: white;
            border: 4px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #388e3c, 0 15px 10px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            pointer-events: auto;
        }
        .btn-green { background: #4caf50; box-shadow: 0 8px 0px #2e7d32; }
        .btn-orange { background: #ff9800; box-shadow: 0 8px 0px #ef6c00; }

        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        .start-title {
            font-family: 'Jua', sans-serif;
            font-size: 4.2rem;
            color: #fffde7;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.1;
            text-shadow: 3px 4px 0px #d84315, 6px 10px 15px rgba(0,0,0,0.2);
        }

        #clear-screen { display: none; }
        #clear-screen h2 { font-family: 'Jua', sans-serif; font-size: 3.5rem; color: #ffeb3b; text-shadow: 2px 3px 0px #e91e63; margin-bottom: 5px; }
        #reward-msg {
            font-family: 'Jua', sans-serif;
            color: #fffde7;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ff9800, #e91e63);
            padding: 10px 20px;
            border-radius: 24px;
            border: 3px solid #fff;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        #book-screen { display: none; background: rgba(44, 62, 80, 0.95); padding: 20px; box-sizing: border-box; }
        .book-title { font-family: 'Jua', sans-serif; font-size: 2.5rem; color: #ffeb3b; margin-bottom: 15px; text-shadow: 2px 2px 0px #e65100; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 16px;
            border: 3px solid #ff9800;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .skin-item {
            background: #fff;
            border: 3px solid #bdc3c7;
            border-radius: 12px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 0px #bdc3c7;
            overflow: hidden;
        }
        .skin-item.active { border-color: #ff9800; background: #fffde7; box-shadow: 0 4px 0px #e65100; }
        
        .skin-item.locked { background: #95a5a6; border-color: #7f8c8d; box-shadow: 0 4px 0px #7f8c8d; cursor: not-allowed; }
        .skin-item.locked .skin-preview { filter: brightness(0.3) contrast(0.5); }
        .skin-item.locked::after { content: '🔒'; position: absolute; font-size: 1.2rem; top: 25%; }

        .skin-item.coming-soon { background: #555; border-color: #333; box-shadow: 0 4px 0px #333; cursor: not-allowed; }
        .skin-item.coming-soon .skin-preview { display: none; }
        .skin-item.coming-soon::after { content: '❌'; position: absolute; font-size: 1.2rem; top: 20%; }
        .skin-item.coming-soon .skin-name { color: #aaa !important; font-size: 1rem; }

        .skin-preview { width: 45px; height: 45px; background-size: 180px 180px; background-repeat: no-repeat; background-position: 0px 0px; }
        .skin-name { font-family: 'Dongle', sans-serif; font-size: 1.1rem; font-weight: bold; line-height: 0.8; color: #5d4037; margin-top: 4px; }

        /* 🌊 배경 및 파티클 애니메이션 */
        @keyframes floatCloud {
            0% { left: -100px; }
            100% { left: 450px; }
        }
        @keyframes waveMotion {
            0% { transform: translateX(0) scaleY(1); }
            100% { transform: translateX(-20px) scaleY(1.1); }
        }
        /* 파티클이 사방으로 퍼지며 서서히 작아지고 사라지는 효과 */
        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--mx), var(--my)) scale(0.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="game-container" ontouchstart="handleGlobalTouch(event)" onmousedown="handleGlobalTouch(event)">
        
        <div class="bg-cloud">☁️</div>
        <div class="bg-cloud cloud-2">☁️</div>

        <div class="bg-palm">🌴</div>
        <div class="bg-palm palm-right">🌴</div>

        <div id="combo-panel">0 COMBO!</div>

        <div id="start-screen" class="overlay-screen">
            <div class="start-title">바나나<br>톡톡!</div>
            <button class="casual-btn btn-green" ontouchstart="startGame(event)" onclick="startGame(event)">게임 시작</button>
        </div>

        <div id="header">
            <h1>바나나 톡톡</h1>
            <div id="info-panel">다음 변신까지 <span id="touch-left">2</span>톡!</div>
            <br>
            <button id="book-open-btn" ontouchstart="openBook(event)" onclick="openBook(event)">📖 바나나 도감</button>
        </div>

        <div id="banana-stage">
            <div id="banana-view"></div>
        </div>

        <div id="footer-text">아무 데나 톡톡!</div>

        <div id="clear-screen" class="overlay-screen">
            <h2>성공! 🎉</h2>
            <div id="reward-msg">도감 획득!</div>
            <button class="casual-btn btn-orange" ontouchstart="resetGame(event)" onclick="resetGame(event)">다시 하기</button>
        </div>

        <div id="book-screen" class="overlay-screen">
            <div class="book-title">바나나 도감 📖</div>
            <div class="grid-container" id="skin-grid"></div>
            <button class="casual-btn btn-green" style="font-size: 1.3rem; padding: 8px 30px;" ontouchstart="closeBook(event)" onclick="closeBook(event)">닫기</button>
        </div>
    </div>

    <script>
        let currentFrame = 1;
        let touchCount = 0;
        const maxFrames = 16;
        const touchesPerFrame = 2;
        let currentSkinNumber = 1;
        let isProcessingTouch = false;

        // 콤보 및 파티클 변수
        let comboCount = 0;
        let lastTouchTime = 0;
        const comboTimeout = 800; // 0.8초 이내에 다시 누르면 연타(콤보)로 인정

        const skinImages = {
            1: 'banana_4x4_1.png',
            2: 'banana_4x4_2.png',
            3: 'banana_4x4_3.png',
            4: 'banana_4x4_4.png',
            5: 'banana_4x4_5.png',
            6: 'banana_4x4_6.png',
            7: 'banana_4x4_7.png',
            8: 'banana_4x4_8.png',
            9: 'banana_4x4_9.png',
            10: 'banana_4x4_10.png'
        };

        function getSkinImageUrl(num) {
            return skinImages[num] || '';
        }

        let unlockedSkins = {};
        for(let i=1; i<=16; i++) {
            unlockedSkins[i] = (i === 1);
        }

        const gameContainer = document.getElementById('game-container');
        const bananaView = document.getElementById('banana-view');
        const touchLeftText = document.getElementById('touch-left');
        const startScreen = document.getElementById('start-screen');
        const clearScreen = document.getElementById('clear-screen');
        const bookScreen = document.getElementById('book-screen');
        const skinGrid = document.getElementById('skin-grid');
        const rewardMsg = document.getElementById('reward-msg');
        const comboPanel = document.getElementById('combo-panel');

        function initBook() {
            skinGrid.innerHTML = '';
            for (let i = 1; i <= 16; i++) {
                const item = document.createElement('div');
                
                if (i > 10) {
                    item.className = `skin-item coming-soon`;
                    item.setAttribute('ontouchstart', `event.stopPropagation();`);
                    item.setAttribute('onclick', `event.stopPropagation();`);
                    
                    const name = document.createElement('div');
                    name.className = 'skin-name';
                    name.innerText = `업데이트 예정`;
                    item.appendChild(name);
                } else {
                    if (unlockedSkins[i]) {
                        item.className = `skin-item ${i === currentSkinNumber ? 'active' : ''}`;
                        item.setAttribute('ontouchstart', `selectSkin(event, ${i})`);
                        item.setAttribute('onclick', `selectSkin(event, ${i})`);
                    } else {
                        item.className = `skin-item locked`;
                        item.setAttribute('ontouchstart', `event.stopPropagation();`);
                        item.setAttribute('onclick', `event.stopPropagation();`);
                    }

                    const preview = document.createElement('div');
                    preview.className = 'skin-preview';
                    preview.style.backgroundImage = `url('${getSkinImageUrl(i)}')`;
                    
                    const name = document.createElement('div');
                    name.className = 'skin-name';
                    name.innerText = unlockedSkins[i] ? `스킨 ${i}` : `???`;

                    item.appendChild(preview);
                    item.appendChild(name);
                }
                skinGrid.appendChild(item);
            }
        }

        function selectSkin(event, skinNum) {
            event.stopPropagation();
            event.preventDefault();
            if (skinNum > 10 || !unlockedSkins[skinNum]) return;
            
            currentSkinNumber = skinNum;
            bananaView.style.backgroundImage = `url('${getSkinImageUrl(skinNum)}')`;
            initBook();
        }

        function updateBananaSprite() {
            const idx = currentFrame - 1;
            const col = idx % 4;
            const row = Math.floor(idx / 4);
            bananaView.style.backgroundPosition = `${-(col * 250)}px ${-(row * 250)}px`;
        }

        function startGame(event) { 
            event.stopPropagation(); 
            event.preventDefault();
            startScreen.style.display = 'none'; 
        }
        
        function openBook(event) { event.stopPropagation(); event.preventDefault(); bookScreen.style.display = 'flex'; }
        function closeBook(event) { event.stopPropagation(); event.preventDefault(); bookScreen.style.display = 'none'; }

        // ✨ 실시간 파티클 스폰 함수
        function createParticles(x, y) {
            // 콤보 수치에 비례해서 파티클 개수 증가 (기본 4개 ~ 최대 20개)
            const baseAmount = 4;
            const extraAmount = Math.min(Math.floor(comboCount / 2), 16);
            const totalParticles = baseAmount + extraAmount;

            const starEmojis = ['⭐', '✨', '🟡', '✨']; // 팡팡 터지는 노란 이펙트 분위기

            for (let i = 0; i < totalParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = starEmojis[Math.floor(Math.random() * starEmojis.length)];
                
                // 터치 좌표 기준으로 파티클 초기 위치 세팅
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                // 사방으로 튀어나갈 무작위 목적지 거리 계산 (CSS 변수로 전달)
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 80; // 콤보가 높아질수록 더 넓게 퍼지게 설정 가능
                const mx = Math.cos(angle) * distance;
                const my = Math.sin(angle) * distance;

                particle.style.setProperty('--mx', `${mx}px`);
                particle.style.setProperty('--my', `${my}px`);

                gameContainer.appendChild(particle);

                // 애니메이션이 끝나면 자동으로 DOM에서 삭제하여 최적화
                particle.addEventListener('animationend', () => {
                    particle.remove();
                });
            }
        }

        // 글로벌 통합 터치 연산 루프
        function handleGlobalTouch(event) {
            if (event.target.tagName === 'BUTTON' || event.target.closest('.skin-item') || (event.target.closest('#book-screen') && event.target === bookScreen)) return;
            if (startScreen.style.display !== 'none' || clearScreen.style.display === 'flex' || bookScreen.style.display === 'flex') return;

            // 터치/클릭 좌표 구하기 (모바일/PC 혼용)
            let touchX = 0;
            let touchY = 0;
            if (event.type === 'touchstart') {
                touchX = event.touches[0].clientX;
                touchY = event.touches[0].clientY;
            } else {
                touchX = event.clientX;
                touchY = event.clientY;
            }

            // 상단 가로 영역 제한 내 보정 계산 (컨테이너 오프셋 차감)
            const rect = gameContainer.getBoundingClientRect();
            const relX = touchX - rect.left;
            const relY = touchY - rect.top;

            if (isProcessingTouch) return;
            isProcessingTouch = true;
            setTimeout(() => { isProcessingTouch = false; }, 50);

            // 콤보 시스템 작동 연산
            const now = Date.now();
            if (now - lastTouchTime <= comboTimeout) {
                comboCount++; // 연타 시 콤보 증가
            } else {
                comboCount = 1; // 텀이 길어지면 콤보 1부터 초기화
            }
            lastTouchTime = now;

            // 콤보 UI 피드백 연출 (3콤보 이상부터 화면에 강조 노출)
            if (comboCount >= 3) {
                comboPanel.innerText = `${comboCount} COMBO!🔥`;
                comboPanel.className = 'active';
            } else {
                comboPanel.className = '';
            }

            // 💥 이펙트 생성 요청 (터치 좌표와 콤보 데이터 연동)
            createParticles(relX, relY);

            // 바나나 팝업 애니메이션 효과
            document.getElementById('banana-stage').style.transform = 'scale(0.85)';
            setTimeout(() => { document.getElementById('banana-stage').style.transform = 'scale(1)'; }, 60);

            if (currentFrame > maxFrames) return;
            touchCount++;
            
            if (touchCount >= touchesPerFrame) {
                touchCount = 0;
                currentFrame++;
                
                if (currentFrame > maxFrames) {
                    currentFrame = maxFrames;
                    updateBananaSprite();
                    handleRewardUnlock();
                    comboPanel.className = ''; // 클리어 시 콤보 UI 숨김
                    setTimeout(() => { clearScreen.style.display = 'flex'; }, 300);
                    return;
                }
            }
            touchLeftText.innerText = touchesPerFrame - touchCount;
            updateBananaSprite();
        }

        function handleRewardUnlock() {
            let lockedList = [];
            for (let i = 2; i <= 10; i++) {
                if (!unlockedSkins[i]) {
                    lockedList.push(i);
                }
            }

            if (lockedList.length > 0) {
                const randomIndex = Math.floor(Math.random() * lockedList.length);
                const newlyUnlockedSkin = lockedList[randomIndex];
                unlockedSkins[newlyUnlockedSkin] = true;
                rewardMsg.innerText = `도감 획득! [스킨 ${newlyUnlockedSkin}]이 열렸어용! 🎉`;
            } else {
                rewardMsg.innerText = `현재 오픈된 모든 스킨을 수집했습니다! 🏆`;
            }
            initBook();
        }

        function resetGame(event) {
            event.stopPropagation();
            event.preventDefault();
            currentFrame = 1; touchCount = 0; comboCount = 0;
            touchLeftText.innerText = touchesPerFrame;
            clearScreen.style.display = 'none';
            comboPanel.className = '';
            updateBananaSprite();
        }

        // 초기 바인딩
        bananaView.style.backgroundImage = `url('${getSkinImageUrl(1)}')`;
        initBook();
        updateBananaSprite();
    </script>
</body>
</html>
